# Rocky Linux 9 basic kickstart for EdgeNet Node Manager
text
lang en_US.UTF-8
keyboard us
timezone UTC --isUtc

# Network configuration
network --bootproto=dhcp --device=link --activate

# Root password (placeholder)
rootpw --lock

# Create edgenet user
user --name=edgenet --groups=wheel --password=edgenet

# System services
services --enabled="sshd,nodemanager"

# Disk partitioning
ignoredisk --only-use=sda
clearpart --all --initlabel
autopart

# Bootloader
bootloader --location=mbr --boot-drive=sda

# Packages
%packages
@^minimal-environment
curl
wget
wireguard-tools
%end

%post
echo "Finalizing EdgeNet Node Manager installation..."
# The nodemanager RPM should be installed here if we have a custom repo
# or we can download it from a known location.
%end
